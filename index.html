    <style>
      :root {
        color-scheme: light dark;
        --boot-bg: #f5f7fb;
        --boot-track: rgba(100, 116, 139, 0.22);
        --boot-accent: #2563eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --boot-bg: #0f172a;
          --boot-track: rgba(148, 163, 184, 0.22);
          --boot-accent: #60a5fa;
        }
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: var(--boot-bg);
      }

      .boot-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--boot-bg);
      }

      .boot-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--boot-track);
        border-top-color: var(--boot-accent);
        border-radius: 50%;
        animation: boot-spin 800ms linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loading" aria-label="Loading">
        <div class="boot-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
